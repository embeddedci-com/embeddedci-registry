type: pin_map
version: 1
id: nucleo-f446re-default
name: NUCLEO-F446RE pin map
targets:
  - id: nucleo-f446re

mappings:
  - protocol: i2c
    backend: force_hw
    lines:
      scl: PB8
      sda: PB9
    config:
      frequency_hz: 400000

  - protocol: uart
    backend: force_hw
    lines:
      tx: PA2
      rx: PA3
    config:
      baud_rate: 115200

  - protocol: gpio
    backend: force_hw
    lines:
      line: PC10
    config:
      direction: input
