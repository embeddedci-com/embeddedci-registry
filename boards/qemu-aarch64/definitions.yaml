# Example (select this board as a build target):
#   targets:
#     - id: qemu-aarch64
type: board
# board architecture
arch: arm64
cross_compile: aarch64-linux-gnu-
boot: qemu
# platform settings
platform: virt
# root file system settings
rootfs_device: /dev/vdb
rootfs_type: ext4

# Prepareboot artifact basenames as they appear inside the build artifact tarball.
# The hw-agent extracts only entries matching these names (no filename guessing).
# QEMU is non-Yocto today, so no yocto_* overrides. QEMU virt has no compatible DTB
# (UEFI/virtio device tree is generated by qemu at runtime) so dtbs is intentionally absent.
kernel_artifact: Image
rootfs_artifact: rootfs.ext4
# console
console: ttyAMA0
# kernel config
defconfig: defconfig
kernel_config:
  - enable:CONFIG_VIRTIO
  - enable:CONFIG_VIRTIO_PCI
  - enable:CONFIG_VIRTIO_BLK
  - enable:CONFIG_VIRTIO_NET
  - enable:CONFIG_SERIAL_AMBA_PL011
  - enable:CONFIG_EFI
  - enable:CONFIG_EFI_STUB

# u-boot config
uboot_defconfig: qemu_arm64_defconfig
enable_distro_boot: false
enable_bootstd: false

# toolchain settings
cc: aarch64-linux-musl-gcc
busybox_static: false