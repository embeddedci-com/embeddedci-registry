# Example (select this board as a build target):
#   targets:
#     - id: beagleboard-black-c3
type: board
# board architecture
platform: am335x
arch: arm
cross_compile: arm-linux-gnueabihf-
boot_mode: disk
# root filesystem device and console settings
rootfs_device: /dev/mmcblk0p2
# Console settings
console: ttyO0,115200n8
# Linux kernel defconfig basename (BR2_LINUX_KERNEL_DEFCONFIG / make target); no _defconfig suffix
defconfig: multi_v7
dtbs: 
  - am335x-boneblack.dtb

# Prepareboot artifact basenames as they appear inside the build artifact tarball.
# The hw-agent extracts only entries matching these names (no filename guessing).
# Default (non-Yocto) names; the *.gz envelope is allowed and gets stripped on deploy.
kernel_artifact: zImage
rootfs_artifact: rootfs.ext4
# Yocto pack overrides (used when the build has the system/yocto-image pack).
yocto_kernel: zImage
yocto_rootfs: core-image-minimal-beaglebone.rootfs.tar.xz
kernel_config:
  - enable:CONFIG_DEVTMPFS
  - enable:CONFIG_DEVTMPFS_MOUNT

# u-boot config
uboot_defconfig: am335x_evm_defconfig
enable_distro_boot: false
enable_bootstd: false

# toolchain settings
cc: arm-linux-musleabihf-gcc
busybox_static: false