type: pin_layout
version: 1
id: nucleo-f446re-harness
name: NUCLEO-F446RE Harness
description: >
  Physical DUT-to-adapter harness mapping for NUCLEO-F446RE.
  MCU pin names (e.g. PB9, PA2) serve as canonical identifiers
  linking this layout to pin maps.
targets:
  - id: nucleo-f446re

signals:
  - pin: PB9
    default_function: I2C1_SDA
    dut:
      connector: CN5
      connector_type: arduino_digital
      connector_pin: 9
      board_label: D14
    harness:
      connector_pin: 6

  - pin: PB8
    default_function: I2C1_SCL
    dut:
      connector: CN5
      connector_type: arduino_digital
      connector_pin: 10
      board_label: D15
    harness:
      connector_pin: 7

  - pin: PA2
    default_function: USART2_TX
    dut:
      connector: CN9
      connector_type: arduino_digital
      connector_pin: 2
      board_label: D1
    harness:
      connector_pin: 3

  - pin: PA3
    default_function: USART2_RX
    dut:
      connector: CN9
      connector_type: arduino_digital
      connector_pin: 1
      board_label: D0
    harness:
      connector_pin: 4

  - pin: NRST
    default_function: RESET
    dut:
      connector: CN6
      connector_type: arduino_power
      connector_pin: 3
      board_label: RESET
    harness:
      connector_pin: 5


  - pin: BOOT0
    default_function: BOOT0
    dut:
      connector: CN7
      connector_type: st_morpho
      connector_pin: 7
      board_label: BOOT0
    harness:
      connector_pin: 13

  - pin: PC10
    default_function: USART3_TX
    dut:
      connector: CN7
      connector_type: st_morpho
      connector_pin: 1
      board_label: PC10
    harness:
      connector_pin: 21

  - pin: PC11
    default_function: USART3_RX
    dut:
      connector: CN7
      connector_type: st_morpho
      connector_pin: 2
      board_label: PC11
    harness:
      connector_pin: 8

  - pin: PA5
    default_function: SPI1_SCK
    dut:
      connector: CN5
      connector_type: arduino_digital
      connector_pin: 7
      board_label: D13
    harness:
      connector_pin: 9

  - pin: PA6
    default_function: SPI1_MISO
    dut:
      connector: CN5
      connector_type: arduino_digital
      connector_pin: 6
      board_label: D12
    harness:
      connector_pin: 10

  - pin: PA7
    default_function: SPI1_MOSI
    dut:
      connector: CN5
      connector_type: arduino_digital
      connector_pin: 5
      board_label: D11
    harness:
      connector_pin: 11

  - pin: PA0
    default_function: ADC1_IN0
    dut:
      connector: CN8
      connector_type: arduino_analog
      connector_pin: 1
      board_label: A0
    harness:
      connector_pin: 12
