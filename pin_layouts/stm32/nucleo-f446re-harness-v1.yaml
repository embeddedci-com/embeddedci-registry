type: pin_layout
version: 1
id: nucleo-f446re-harness
name: NUCLEO-F446RE Harness
description: >
  Physical DUT-to-adapter harness mapping for NUCLEO-F446RE.
  MCU pin names (e.g. PB9, PA2) serve as canonical identifiers linking this layout to pin maps.
  harness.connector_pin indexes pin_harness/default-b.yaml; dut.board_connector_pin is the Nucleo connector position.
targets:
  - id: nucleo-f446re

harness: default-a

signals:

  - pin: PB9
    default_function: I2C1_SDA
    dut:
      connector: CN5
      connector_type: arduino
      board_connector_pin: 9
      board_label: D14
    harness:
      connector_pin: 6

  - pin: PB8
    default_function: I2C1_SCL
    dut:
      connector: CN5
      connector_type: arduino
      board_connector_pin: 10
      board_label: D15
    harness:
      connector_pin: 7

  - pin: PA2
    default_function: USART2_TX
    dut:
      connector: CN9
      connector_type: arduino
      board_connector_pin: 2
      board_label: D1
    harness:
      connector_pin: 2

  - pin: PA3
    default_function: USART2_RX
    dut:
      connector: CN9
      connector_type: arduino
      board_connector_pin: 1
      board_label: D0
    harness:
      connector_pin: 1

  - pin: BOOT0
    default_function: BOOT0
    dut:
      connector: CN7
      connector_type: morpho
      board_connector_pin: 7
      board_label: BOOT0
