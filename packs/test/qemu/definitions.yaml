type: test
scripts:
  run: scripts/run.sh

test_config:
  timeout_sec: 30
  cpu: cortex-a53
  memory: 1024
  boot_success_pattern: "Kernel: Linux"
  env_mapping:
    UBOOT_BIN: uboot_bin
    BOOTFAT_IMG: bootfat_img
    ROOTFS_IMG: rootfs_ext4

default_vars: {}

dependencies:
  - name: uboot_bin
    pack: boot/uboot
    dest: u-boot.bin
  - name: bootfat_img
    pack: boot/bootfat
    dest: bootfat.img
  - name: rootfs_ext4
    pack: app/rootfs-image
    dest: rootfs.ext4

artifacts: []
