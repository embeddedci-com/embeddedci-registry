type: boot
config:
  defconfig: qemu_arm64_defconfig
  ref: "{{ref}}"
  arch: "{{arch}}"
  uboot_src: "{{build_root}}/uboot_src"

default_vars:
  repo: https://github.com/u-boot/u-boot.git
  ref: v2026.01
  arch: arm64

scripts:
  build: scripts/build.sh

dependencies:
  - pack: fetch
    dest: uboot_src
    src: "{{repo}}"
    as: uboot_src

artifacts:
  - path: u-boot.bin
    source_key: fetch::uboot_src

skip:
  check_paths:
    - u-boot.bin
