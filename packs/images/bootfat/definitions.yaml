# Example (build definition pack entry):
#   packs:
#     - id: images/bootfat
type: package
scripts:
  build: scripts/build.sh

dependencies:
  - pack: base/kernel-linux
    dest: kernel
    copy_source_dir: true
  - pack: initramfs/busybox
    dest: initramfs.cpio.gz
    optional: true

artifacts:
  - path: bootfat.img

skip:
  check_paths:
    - bootfat.img

config:
  kernel_image: "{{build_root}}/kernel/{{arch_image_name}}"
  initrd: "{{build_root}}/initramfs.cpio.gz"
