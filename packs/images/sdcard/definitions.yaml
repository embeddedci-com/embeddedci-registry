# Example (build definition pack entry):
#   packs:
#     - id: images/sdcard
type: image-sdcard
scripts:
  build: scripts/build.sh

default_vars: {}

dependencies:
  - pack: boot/bootfat
    dest: bootfat.img
  - pack: app/rootfs-image
    dest: rootfs.ext4

artifacts:
  - path: sdcard.img
    name: "{{sdcard_img_name}}"

skip:
  check_paths:
    - sdcard.img

config:
  sdcard_img_name: "{{sdcard_img_name}}"
  bootfat_img: "{{build_root}}/bootfat.img"
  rootfs_img: "{{build_root}}/rootfs.ext4"
