type: rootfs-image
scripts:
  build: scripts/build.sh

default_vars:
  BUSYBOX_REF: "1_36_1"
  busybox_repo: https://github.com/embeddedci-com/busybox-mirror
  rootfs_user: ""           # empty = no non-root user; set e.g. embeddedci to create one
  rootfs_password: ""      # password for non-root user (used only if rootfs_user set)
  rootfs_root_password: ""  # empty = root locked; set to enable root login

dependencies:
  - pack: fetch
    dest: busybox_src
    src: "{{busybox_repo}}"
    as: busybox_src
  - name: app_bin
    pack: app/build
    dest: "out/app-build/{{artifact}}"
    as: app_bin

artifacts:
  - path: rootfs.ext4

skip:
  check_paths:
    - rootfs.ext4

config:
  artifact: "{{artifact}}"
  app_dst: "{{app_dst}}"
  img: "rootfs.ext4"
  size_mb: "{{size_mb}}"
  hostname: "{{hostname}}"
  console_login: "{{console_login}}"
  busybox_ref: "{{busybox_ref}}"
  rootfs_user: "{{rootfs_user}}"
  rootfs_password: "{{rootfs_password}}"
  rootfs_root_password: "{{rootfs_root_password}}"
  rootdir: "{{build_root}}/rootfs"
  app_bin: "{{build_root}}/app_bin"
  busybox_src: "{{build_root}}/busybox_src"
