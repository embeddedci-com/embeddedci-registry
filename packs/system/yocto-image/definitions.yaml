# Example (build definition pack entry):
#   packs:
#     - id: system/yocto-image
#       artifacts:
#         - path: images/beaglebone/core-image-minimal-beaglebone.wic
#         - path: images/beaglebone/zImage
#         - path: images/beaglebone/am335x-boneblack.dtb
#       config:
#         source: git+https://github.com/embeddedci-com/examples.git//yocto-kas-image?ref=main
#         kas_file: kas.yml
type: yocto

# Same pattern as buildroot-kernel: `source` is the git URL (git+https://...//subpath?ref=...); engine fetch clones it.
config:
  source: "{{source}}"
  kas_config_src: "{{build_root}}/kas_config_src"
  kas_file: "{{kas_file}}"
  yocto_staging_dir: yocto-staging
  yocto_sstate_dir: yocto/sstate
  yocto_dl_dir: yocto/downloads

default_vars:
  source: ""
  kas_file: kas.yml

scripts:
  build: scripts/build.sh

dependencies:
  - pack: fetch
    dest: kas_config_src
    src: "{{source}}"

artifacts:
  - name: deploy-images
    path: "yocto-staging/tmp/deploy/images/"

skip:
  check_paths:
    - yocto-staging
