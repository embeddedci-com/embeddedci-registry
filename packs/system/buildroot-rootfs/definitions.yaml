# Example (build definition pack entry):
#   packs:
#     - id: system/buildroot-rootfs
#       config:
#         source: git+https://github.com/embeddedci-com/examples.git//buildroot-external/generic-rootfs?ref=main
#         defconfig: arm_defconfig
#         app_artifacts:
#           - artifact: selftest
#             dst: /usr/bin/selftest
#             mode: "0755"
#         overlays:
#           - board/generic-rootfs/overlays/common
#           - board/generic-rootfs/overlays/debug
#         outputs:
#           - ext4
type: rootfs

config:
  source: "{{source}}"
  defconfig: "{{defconfig}}"
  # After fetch+copy: BR2_EXTERNAL at buildroot_external (git URL or project-relative path)
  buildroot_config_dir: "{{build_root}}/buildroot_external"
  buildroot_tree: "{{build_root}}/buildroot_src"
  outputs: "{{outputs}}"
  overlays: "{{overlays}}"
  app_artifacts: "{{app_artifacts}}"
  app_bin: "{{build_root}}/app_bin"

default_vars:
  source: ""
  outputs: "ext4"
  hostname: "embedded-ci"
  console_login: "disabled"
  buildroot_repo: https://github.com/buildroot/buildroot.git
  buildroot_ref: "2026.02"

scripts:
  build: scripts/build.sh

dependencies:
  - pack: fetch
    dest: buildroot_src
    src: "{{buildroot_repo}}?ref={{buildroot_ref}}"
  - pack: fetch
    dest: buildroot_external
    src: "{{source}}"
  - pack: apps/build
    dest: "out/app-build/{{artifact}}"
    optional: true

artifacts:
  - path: rootfs.ext4
    build_path: "buildroot_out/images/rootfs.ext4"
