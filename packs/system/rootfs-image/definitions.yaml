# Example (build definition pack entries):
#   packs:
#     - id: apps/build
#       config:
#         cmd: make
#         src: git+https://github.com/embeddedci-com/examples.git//selftest?ref=main
#       artifacts:
#         - path: selftest
#           name: selftest
#     - id: system/rootfs-image
#       config:
#         app_dst:
#           - name: selftest  # must match PACK_DEPENDENCIES_JSON artifact_name (or non-* dependency name)
#             path: /usr/bin/selftest
#         size_mb: "64"
#         hostname: embedded-ci-1
#         console_login: enabled
#         rootfs_user: embeddedci
#         rootfs_password: embeddedci
#         rootfs_root_password: embeddedci
type: rootfs-image
scripts:
  build: scripts/build.sh

default_vars:
  busybox_ref: "1_36_1"
  busybox_repo: https://github.com/embeddedci-com/busybox-mirror
  rootfs_user: ""           # empty = no non-root user; set e.g. embeddedci to create one
  rootfs_password: ""      # password for non-root user (used only if rootfs_user set)
  rootfs_root_password: ""  # empty = root locked; set to enable root login

dependencies:
  - pack: fetch
    dest: busybox_src
    src: "{{busybox_repo}}?ref={{busybox_ref}}"
  - pack: apps/build
    name: "*"

artifacts:
  - path: rootfs.ext4

skip:
  check_paths:
    - rootfs.ext4

config:
  app_dst: "{{app_dst}}"
  img: "rootfs.ext4"
  size_mb: "{{size_mb}}"
  hostname: "{{hostname}}"
  console_login: "{{console_login}}"
  busybox_ref: "{{busybox_ref}}"
  rootfs_user: "{{rootfs_user}}"
  rootfs_password: "{{rootfs_password}}"
  rootfs_root_password: "{{rootfs_root_password}}"
  rootdir: "{{build_root}}/rootfs"
  busybox_src: "{{build_root}}/busybox_src"
