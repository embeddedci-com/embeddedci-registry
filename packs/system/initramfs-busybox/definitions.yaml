# Example (build definition pack entry):
#   packs:
#     - id: system/initramfs-busybox
#       targets: ["qemu-aarch64"]
#       config:
#         ref: "1_36_1"
type: rootfs

default_vars:
  busybox_repo: https://github.com/embeddedci-com/busybox-mirror
  ref: "1_36_1"
  config: configs/busybox-min.config

scripts:
  build: scripts/build.sh

dependencies:
  - pack: fetch
    dest: busybox_src
    src: "{{busybox_repo}}"

artifacts:
  - path: initramfs.cpio.gz

skip:
  check_paths:
    - initramfs.cpio.gz

config:
  ref: "{{ref}}"
  busybox_src: "{{build_root}}/busybox_src"
