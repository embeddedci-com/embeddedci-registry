# Example (build definition pack entry):
#   packs:
#     - id: apps/build
#       config:
#         cmd: make
#         artifact: selftest
type: app
scripts:
  build: scripts/build.sh

default_vars: {}

dependencies:
  - pack: fetch
    dest: "{{artifact}}"
    src: "{{src}}"
    optional: true

artifacts:
  - path: "out/app-build/{{artifact}}"

config:
  cmd: "{{cmd}}"
  src: "{{src}}"
  artifact: "{{artifact}}"
  out: "{{out}}"
  dst: "{{dst}}"
