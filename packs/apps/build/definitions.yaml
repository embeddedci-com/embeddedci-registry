# Example (build definition pack entry):
#   packs:
#     - id: apps/build
#       config:
#         cmd: make
#       artifact: selftest
type: app
scripts:
  build: scripts/build.sh

default_vars: {}

dependencies:
  - pack: fetch
    src: "{{src}}"
    optional: true

config:
  cmd: "{{cmd}}"
  src: "{{src}}"